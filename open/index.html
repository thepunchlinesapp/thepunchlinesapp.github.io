<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F7F7F2">
    <title>Ouvrir Punchlines</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Madimi+One&family=Shantell+Sans:wght@500&family=Epilogue:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/punchlines.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #F7F7F2;
            text-align: center;
        }
        .container { padding: 1.5rem; max-width: 360px; }
        .logo {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            margin: 0 auto 1.25rem;
            display: block;
            background: #EEEBE6;
            padding: 6px;
            box-shadow: 0 12px 24px -12px rgba(50, 50, 50, 0.25);
        }
        h1 {
            font-family: 'Madimi One', sans-serif;
            font-size: 2rem;
            color: #323232;
            margin: 0 0 0.5rem;
        }
        .eyebrow {
            font-family: 'Shantell Sans', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 0.5rem;
        }
        p { color: #666; margin: 0 0 1.5rem; line-height: 1.5; }
        .actions { display: flex; flex-direction: column; gap: 0.75rem; align-items: center; }
        .cta-clay { width: 100%; max-width: 280px; }
        .loading {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #E5E0D8;
            border-top-color: #7AB1BC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .redirect-note { font-size: 0.85rem; color: #999; margin-top: 1.5rem; }
        .redirect-note.hidden { display: none; }
    </style>
    <script>
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        var isAndroid = /Android/.test(navigator.userAgent);
        var appStoreUrl = 'https://apps.apple.com/fr/app/punchlines-affirmations/id6744821000';
        var playStoreUrl = 'https://play.google.com/store/apps/details?id=fr.harryjmg.punchlines';

        if (isIOS || isAndroid) {
            setTimeout(function() {
                window.location.href = isIOS ? appStoreUrl : playStoreUrl;
            }, 1500);
        }
    </script>
</head>
<body>
    <div class="container">
        <img src="/assets/logos/logo_text.png" alt="Punchlines" class="logo">
        <p class="eyebrow">Tu peux encore changer</p>
        <h1>Ouverture de l'app…</h1>
        <p>Si rien ne se passe, télécharge Punchlines depuis ton store.</p>
        <div class="actions">
            <a href="https://apps.apple.com/fr/app/punchlines-affirmations/id6744821000" class="cta-clay cta-clay--lg">
                <span>App Store</span>
            </a>
            <a href="https://play.google.com/store/apps/details?id=fr.harryjmg.punchlines" class="cta-clay cta-clay--lg cta-clay--green">
                <span>Google Play</span>
            </a>
        </div>
        <p class="redirect-note" id="redirect-note">
            <span class="loading"></span> Redirection automatique…
        </p>
    </div>
    <script>
        if (!isIOS && !isAndroid) {
            document.getElementById('redirect-note').classList.add('hidden');
        }
    </script>
</body>
</html>
